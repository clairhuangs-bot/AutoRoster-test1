<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoRoster — 客服團隊自動排班系統</title>
  <meta name="description" content="客服團隊自動排班工具：一鍵產出月班表，戰力均衡、連班控管、小暑假人力調配全自動。">
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="app-layout">
  <!-- ======== HEADER ======== -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-icon">📋</div>
      <div>
        <h1>AutoRoster</h1>
        <span class="brand-sub">客服團隊自動排班系統</span>
      </div>
    </div>
    <div class="month-selector">
      <button id="btn-prev-month" title="上個月">‹</button>
      <span class="month-display" id="month-display">2026 年 4 月</span>
      <button id="btn-next-month" title="下個月">›</button>
    </div>
  </header>

  <!-- ======== SIDEBAR ======== -->
  <aside class="sidebar">
    <!-- Team Roster -->
    <div class="section-title">
      <span class="icon">👥</span> 團隊成員 
      <button class="btn-edit-team" id="btn-edit-team" title="編輯成員">✏️</button>
    </div>
    <div class="team-list" id="team-list">
      <!-- 由 app.js 自動渲染 -->
    </div>

    <!-- Leave Config -->
    <div class="section-title">
      <span class="icon">📅</span> 必排休假日
    </div>
    <div class="leave-config" id="leave-config" style="padding: 0 16px 16px 16px;">
      <!-- 由 app.js 自動渲染每位成員的休假輸入框 -->
    </div>

    <!-- Summer Vacation -->
    <div class="section-title">
      <span class="icon">🏖️</span> 小暑假設定 (7天長假)
    </div>
    <div class="summer-config">
      <div class="summer-toggle">
        <label for="summer-toggle">🌴 啟用小暑假配置</label>
        <input type="checkbox" class="toggle-switch" id="summer-toggle">
      </div>
      <div class="summer-fields" id="summer-fields">
        <div class="form-group">
          <label for="summer-member">休假人員</label>
          <select id="summer-member"></select>
        </div>
        <div class="form-group">
          <label for="summer-start">起始日期 (日)</label>
          <input type="number" id="summer-start" min="1" max="25" value="1">
        </div>
        <div class="form-group" style="pointer-events:none;opacity:0.6">
          <label>結束日期 (自動計算)</label>
          <input type="text" id="summer-end" readonly value="—">
        </div>
      </div>
    </div>
  </aside>

  <!-- ======== MAIN ======== -->
  <main class="main-content">
    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-buttons">
        <button class="btn-generate" id="btn-generate">
          🚀 產出自動排班
        </button>
        <button class="btn-copy-schedule" id="btn-copy-schedule">
          📋 複製班表文字
        </button>
      </div>
      <div class="view-toggles" id="view-toggles" style="display:none; gap: 8px;">
        <button class="btn-view active" id="btn-view-calendar">📅 日曆</button>
        <button class="btn-view" id="btn-view-table">📊 表格</button>
      </div>
    </div>

    <!-- Calendar View -->
    <div class="calendar-container" id="calendar-container">
      <div class="calendar-header">
        <div class="day-label">日</div>
        <div class="day-label">一</div>
        <div class="day-label">二</div>
        <div class="day-label">三</div>
        <div class="day-label">四</div>
        <div class="day-label">五</div>
        <div class="day-label">六</div>
      </div>
      <div class="calendar-grid" id="calendar-grid">
        <!-- 排班結果會渲染在此 -->
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📅</div>
      <h2>尚未產生班表</h2>
      <p>請於左側設定成員休假需求與小暑假資訊後，點擊「🚀 產出自動排班」。</p>
    </div>

    <!-- Summary (after scheduling) -->
    <div class="summary-section" id="summary-section" style="display:none; margin-top: 24px;">
      <div class="summary-card">
        <h3 style="margin-bottom: 12px; color: var(--primary);">⚠️ 規則走查 (Walkthrough) 警示</h3>
        <div class="alert-list" id="alert-list"></div>
      </div>
      
      <div class="summary-card" style="margin-top: 16px;">
        <h3 style="margin-bottom: 12px;">📊 人員月出勤統計</h3>
        <table class="stats-table">
          <thead>
            <tr>
              <th>姓名</th>
              <th>職務</th>
              <th>效率</th>
              <th>出勤天數</th>
              <th>休假天數</th>
            </tr>
          </thead>
          <tbody id="stats-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ======== TEAM EDITOR MODAL (編輯團隊名單) ======== -->
<div class="modal-overlay" id="team-editor-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h2>👥 團隊成員管理</h2>
      <button class="modal-close" id="btn-editor-close">&times;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom: 12px; color: var(--text-muted);">在此定義團隊職稱，系統將據此分配「1值班+2組員」的人力配比。</p>
      <table class="editor-table">
        <thead>
          <tr>
            <th>姓名</th>
            <th>職務 (Leader/Deputy/Member)</th>
            <th>效率</th>
          </tr>
        </thead>
        <tbody id="editor-tbody">
          <!-- 由 JS 渲染 -->
        </tbody>
      </table>
    </div>
    <div class="modal-footer">
      <div style="font-size: 12px; color: var(--text-muted);">* Leader/Deputy 會被視為「值班者」</div>
      <button class="btn-modal-save" id="btn-editor-save">💾 儲存名單</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
